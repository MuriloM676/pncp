<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PNCP - Oportunidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div x-data="pncpApp()" x-init="init()" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <header class="mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-6">Painel Compras.gov.br</h1>
            
            <nav class="flex space-x-1 bg-slate-200 p-1 rounded-lg w-fit">
                <button @click="activeTab = 'oportunidades'" :class="activeTab === 'oportunidades' ? 'bg-white shadow text-blue-700' : 'text-slate-600 hover:text-slate-900'" class="py-2.5 px-6 font-semibold rounded-md transition-all">Oportunidades</button>
                <button @click="activeTab = 'materiais'" :class="activeTab === 'materiais' ? 'bg-white shadow text-blue-700' : 'text-slate-600 hover:text-slate-900'" class="py-2.5 px-6 font-semibold rounded-md transition-all">Materiais</button>
                <button @click="activeTab = 'contratos'" :class="activeTab === 'contratos' ? 'bg-white shadow text-blue-700' : 'text-slate-600 hover:text-slate-900'" class="py-2.5 px-6 font-semibold rounded-md transition-all">Contratos</button>
            </nav>
        </header>

        <!-- Loading State -->
        <div x-show="loading" class="flex justify-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-800"></div>
        </div>

        <!-- Error State -->
        <div x-show="error" x-cloak class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-6">
            <strong class="font-bold">Erro!</strong>
            <span class="block sm:inline" x-text="error"></span>
            <button @click="fetchOportunidades()" class="underline ml-2">Tentar novamente</button>
        </div>

        <!-- Conteúdo: Oportunidades -->
        <div x-show="activeTab === 'oportunidades'" x-cloak class="space-y-6">
            <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold text-slate-800">Oportunidades Recentes</h2>
                <select x-model="filterUf" @change="fetchOportunidades()" class="bg-slate-50 border border-slate-300 rounded-lg py-2 px-4 focus:ring-2 focus:ring-blue-500">
                    <option value="">Brasil (Todos)</option>
                    <template x-for="uf in ufs" :key="uf">
                        <option :value="uf" x-text="uf"></option>
                    </template>
                </select>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="op in oportunidades" :key="op.idCompra">
                    <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 hover:shadow-md transition-shadow cursor-pointer" @click="openModal(op)">
                        <div class="flex justify-between items-start mb-4">
                            <span class="bg-blue-50 text-blue-700 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider" x-text="op.unidadeOrgaoUfSigla"></span>
                            <span class="text-slate-400 text-xs font-medium" x-text="formatDate(op.dataPublicacaoPncp)"></span>
                        </div>
                        <h3 class="text-base font-semibold text-slate-900 mb-2 line-clamp-3 leading-snug" x-text="op.objetoCompra"></h3>
                        <p class="text-sm text-slate-500 mb-6 truncate" x-text="op.orgaoEntidadeRazaoSocial"></p>
                        
                        <div class="mt-auto pt-4 border-t border-slate-100 flex justify-between items-center">
                            <span class="text-blue-700 font-bold" x-text="formatCurrency(op.valorTotalEstimado)"></span>
                            <span class="text-xs font-mono text-slate-400" x-text="op.numeroCompra"></span>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Conteúdo: Materiais -->
        <div x-show="activeTab === 'materiais'" x-cloak>
            <div class="bg-white p-6 rounded-lg shadow mb-6">
                <h2 class="text-xl font-bold mb-4">Catálogo de Materiais</h2>
                <div class="flex gap-4">
                    <button @click="tipoMaterial = 'grupos'; fetchMateriais()" class="px-4 py-2 bg-blue-800 text-white rounded">Grupos</button>
                    <button @click="tipoMaterial = 'classes'; fetchMateriais()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded">Classes</button>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="min-w-full divide-y divide-slate-200">
                    <thead class="bg-slate-50">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Código</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider" x-text="tipoMaterial === 'grupos' ? 'Nome do Grupo' : 'Nome da Classe'"></th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 bg-white">
                        <template x-for="item in materiais" :key="tipoMaterial === 'grupos' ? item.codigoGrupo : item.codigoClasse">
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="px-6 py-4 text-sm font-semibold text-slate-900" x-text="tipoMaterial === 'grupos' ? item.codigoGrupo : item.codigoClasse"></td>
                                <td class="px-6 py-4 text-sm text-slate-600" x-text="tipoMaterial === 'grupos' ? item.nomeGrupo : item.nomeClasse"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Modal de Detalhes -->
        <div x-show="modalOpen" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black bg-opacity-50" @keydown.escape.window="modalOpen = false">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col" @click.away="modalOpen = false">
                <div class="p-6 border-b flex justify-between items-center">
                    <h3 class="text-xl font-bold text-gray-800" x-text="'Processo ' + (processoDetalhe?.numeroLicitacao || '')"></h3>
                    <button @click="modalOpen = false" class="text-gray-500 hover:text-gray-800">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                
                <div class="p-6 overflow-y-auto flex-grow">
                    <div x-show="modalLoading" class="flex justify-center py-8">
                        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-800"></div>
                    </div>
                    
                    <div x-show="!modalLoading && processoDetalhe" class="space-y-6">
                        <section>
                            <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-2">Objeto</h4>
                            <p class="text-gray-800 leading-relaxed" x-text="processoDetalhe?.objeto"></p>
                        </section>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Órgão</h4>
                                <p x-text="processoDetalhe?.nomeOrgao"></p>
                            </div>
                            <div>
                                <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Localidade</h4>
                                <p x-text="processoDetalhe?.municipioNome + ' / ' + processoDetalhe?.siglaUf"></p>
                            </div>
                            <div>
                                <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Valor Estimado</h4>
                                <p class="text-lg font-bold text-green-600" x-text="formatCurrency(processoDetalhe?.valorEstimado)"></p>
                            </div>
                            <div>
                                <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1">Data de Abertura</h4>
                                <p x-text="formatDate(processoDetalhe?.dataAberturaPropostas)"></p>
                            </div>
                        </div>

                        <!-- Itens em Disputa / Lances -->
                        <section x-show="disputas.length > 0">
                            <h4 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Itens em Disputa</h4>
                            <div class="border rounded-lg overflow-hidden">
                                <table class="min-w-full divide-y divide-gray-200">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Item</th>
                                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase">Descrição</th>
                                            <th class="px-4 py-2 text-right text-xs font-medium text-gray-500 uppercase">Melhor Lance</th>
                                        </tr>
                                    </thead>
                                    <tbody class="bg-white divide-y divide-gray-200">
                                        <template x-for="item in disputas" :key="item.idItem">
                                            <tr>
                                                <td class="px-4 py-2 text-sm text-gray-900" x-text="item.numeroItem"></td>
                                                <td class="px-4 py-2 text-sm text-gray-500" x-text="item.descricao"></td>
                                                <td class="px-4 py-2 text-sm text-right font-bold text-blue-600" x-text="formatCurrency(item.valorMelhorLance)"></td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="p-6 border-t bg-gray-50 flex justify-end">
                    <button @click="modalOpen = false" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function pncpApp() {
            return {
                oportunidades: [],
                loading: false,
                error: null,
                filterUf: '',
                activeTab: 'oportunidades',
                countdown: 300,
                modalOpen: false,
                modalLoading: false,
                processoDetalhe: null,
                disputas: [],
                ufs: ['AC', 'AL', 'AP', 'AM', 'BA', 'CE', 'DF', 'ES', 'GO', 'MA', 'MT', 'MS', 'MG', 'PA', 'PB', 'PR', 'PE', 'PI', 'RJ', 'RN', 'RS', 'RO', 'RR', 'SC', 'SP', 'SE', 'TO'],
                apiUrl: 'http://localhost:8080',

                materiais: [],
                tipoMaterial: 'grupos',
                
                init() {
                    this.fetchOportunidades();
                    this.fetchMateriais();
                    setInterval(() => {
                        if (this.countdown > 0) {
                            this.countdown--;
                        } else {
                            this.fetchOportunidades();
                        }
                    }, 1000);
                },

                async fetchMateriais() {
                    this.loading = true;
                    try {
                        const res = await fetch(`${this.apiUrl}/materiais-consulta?tipo=${this.tipoMaterial}`);
                        const data = await res.json();
                        this.materiais = data.resultado || [];
                    } catch (e) {
                        console.error('Erro ao carregar materiais:', e);
                    } finally {
                        this.loading = false;
                    }
                },

                async fetchOportunidades() {
                    this.loading = true;
                    this.error = null;
                    try {
                        const response = await fetch(`${this.apiUrl}/oportunidades?uf=${this.filterUf}`);
                        if (!response.ok) {
                            const errData = await response.json();
                            throw new Error(errData.error || 'Falha ao carregar oportunidades');
                        }
                        this.oportunidades = await response.json();
                        this.countdown = 300;
                    } catch (e) {
                        this.error = e.message;
                    } finally {
                        this.loading = false;
                    }
                },

                async openModal(op) {
                    this.modalOpen = true;
                    this.modalLoading = true;
                    this.processoDetalhe = null;
                    this.disputas = [];
                    
                    try {
                        const resProc = await fetch(`${this.apiUrl}/processo?id=${op.idCompra}`);
                        if (resProc.ok) {
                            const data = await resProc.json();
                            const item = Array.isArray(data) ? data[0] : data;
                            this.processoDetalhe = {
                                objeto: item.objetoCompra,
                                nomeOrgao: item.orgaoEntidadeRazaoSocial,
                                municipioNome: item.unidadeOrgaoMunicipioNome,
                                siglaUf: item.unidadeOrgaoUfSigla,
                                valorEstimado: item.valorTotalEstimado,
                                dataAberturaPropostas: item.dataAberturaPropostaPncp,
                                numeroLicitacao: item.numeroCompra
                            };
                        }
                    } catch (e) {
                        console.error('Erro ao carregar detalhes:', e);
                    } finally {
                        this.modalLoading = false;
                    }
                },

                formatCurrency(value) {
                    if (!value) return 'R$ 0,00';
                    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
                },

                formatDate(dateStr) {
                    if (!dateStr) return '';
                    return new Date(dateStr).toLocaleString('pt-BR');
                }
            }
        }
    </script>
</body>
</html>
