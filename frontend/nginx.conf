server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para o backend (opcional se quiser usar mesma porta, 
    # mas o compose já expõe 8080)
    # location /api/ {
    #     proxy_pass http://backend:80/;
    # }
}
